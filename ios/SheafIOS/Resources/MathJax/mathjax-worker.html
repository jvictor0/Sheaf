<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        svg: {
          fontCache: 'local'
        },
        startup: {
          typeset: false
        }
      };
    </script>
    <script src="./tex-svg.js"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
      }
      #container {
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <script>
      async function renderMath(tex, block) {
        if (!window.MathJax || !MathJax.tex2svgPromise) {
          const escaped = tex
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;');
          return {
            svg: `<span style="font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #666;">${block ? '$$' : '$'}${escaped}${block ? '$$' : '$'}</span>`,
            width: 100,
            height: block ? 26 : 20,
            baseline: 0
          };
        }
        const svgNode = await MathJax.tex2svgPromise(tex, { display: block });
        const svg = svgNode.querySelector('svg');
        if (!svg) {
          return { svg: '', width: 0, height: 0, baseline: 0 };
        }

        const html = svg.outerHTML;
        const width = Number(svg.getAttribute('width')?.replace('ex', '')) || 0;
        const height = Number(svg.getAttribute('height')?.replace('ex', '')) || 0;
        return {
          svg: html,
          width: width * 8,
          height: height * 8,
          baseline: 0
        };
      }
    </script>
  </body>
</html>
